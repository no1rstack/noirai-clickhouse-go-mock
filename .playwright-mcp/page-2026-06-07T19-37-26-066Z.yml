          - generic [ref=e388]:
            - generic [ref=e389]:
              - heading "Trace Explorer" [level=1] [ref=e390]
              - paragraph [ref=e391]: Understand the Trace Explorer in NoirAI — views, filtering, trace matching, and how to save and act on your results.
            - generic [ref=e392]:
              - paragraph [ref=e393]: A trace is a recording of the path a request takes through your system — from the first service it hits to every downstream call it makes. Each trace is made up of spans, where each span represents a single unit of work in one service.
              - heading "Prerequisites" [level=2] [ref=e394]:
                - link "Prerequisites" [ref=e395] [cursor=pointer]:
                  - /url: "#prerequisites"
              - heading "Introduction" [level=2] [ref=e396]:
                - link "Introduction" [ref=e397] [cursor=pointer]:
                  - /url: "#introduction"
              - paragraph [ref=e398]: "The Traces Explorer page in NoirAI enables developers to filter, examine, and analyze traces. There are four different views available in Traces Explorer which include:"
              - list [ref=e399]:
                - listitem [ref=e400]:
                  - link "List View" [ref=e401] [cursor=pointer]:
                    - /url: "#list-view"
                - listitem [ref=e402]:
                  - link "Trace View" [ref=e403] [cursor=pointer]:
                    - /url: "#traces-view"
                - listitem [ref=e404]:
                  - link "Time Series View" [ref=e405] [cursor=pointer]:
                    - /url: "#time-series-view"
                - listitem [ref=e406]:
                  - link "Table View" [ref=e407] [cursor=pointer]:
                    - /url: "#table-view"
              - heading "List View" [level=3] [ref=e408]:
                - link "List View" [ref=e409] [cursor=pointer]:
                  - /url: "#list-view"
              - paragraph [ref=e410]: The List View is the default view on the Traces Explorer page. It shows individual spans matching your filters.
              - figure "List View in Trace Explorer" [ref=e411]:
                - generic [ref=e419]:
                  - img [ref=e420]
                  - generic [ref=e423]: List View in Trace Explorer
                - generic [ref=e424]: List View in Trace Explorer
              - paragraph [ref=e425]:
                - strong [ref=e426]: Span Scope
              - paragraph [ref=e427]:
                - text: Use the
                - strong [ref=e428]: All Spans / Root Spans / Entrypoint Spans
                - text: "dropdown on the right to control which spans are shown:"
              - list [ref=e429]:
                - listitem [ref=e430]:
                  - strong [ref=e431]: All Spans
                  - text: — shows every span matching your filters, regardless of position in the trace.
                - listitem [ref=e432]:
                  - strong [ref=e433]: Root Spans
                  - text: — shows only the top-level span of each trace (the span with no parent).
                - listitem [ref=e434]:
                  - strong [ref=e435]: Entrypoint Spans
                  - text: — shows only the first span when a request enters a service from an upstream service, giving a high-level view of cross-service traffic.
              - paragraph [ref=e436]:
                - strong [ref=e437]: Customize Columns
              - paragraph [ref=e438]:
                - text: Click the
                - strong [ref=e439]: Options
                - text: button on the right side of the toolbar to add or remove columns from the list. For example, you can add
                - code [ref=e440]: service.name
                - text: ","
                - code [ref=e441]: http_method
                - text: ","
                - code [ref=e442]: response_status_code
                - text: ", or"
                - code [ref=e443]: event_type
                - text: to display alongside each span.
              - figure "Customize columns using the Options panel in List View" [ref=e444]:
                - generic [ref=e452]:
                  - img [ref=e453]
                  - generic [ref=e456]: Customize columns using the Options panel in List View
                - generic [ref=e457]: Customize columns using the Options panel in List View
              - generic [ref=e458]:
                - paragraph [ref=e459]: Note
                - paragraph [ref=e461]: Timestamp column can't be removed.
              - paragraph [ref=e462]:
                - strong [ref=e463]: Number of Spans to display
              - paragraph [ref=e464]: You can increase the number of spans displayed up to 200/page using the dropdown on the top right.
              - figure "Increase the number of spans displayed in List View" [ref=e465]:
                - generic [ref=e473]:
                  - img [ref=e474]
                  - generic [ref=e477]: Increase the number of spans displayed in List View
                - generic [ref=e478]: Increase the number of spans displayed in List View
              - generic [ref=e479]:
                - paragraph [ref=e480]: Note
                - paragraph [ref=e482]:
                  - strong [ref=e483]: Group By
                  - text: ","
                  - strong [ref=e484]: Add Formula
                  - text: ", and"
                  - strong [ref=e485]: Order By
                  - text: are not supported in List View or Trace View. Use Time Series or Table View for aggregation and grouping.
              - heading "Traces View" [level=3] [ref=e486]:
                - link "Traces View" [ref=e487] [cursor=pointer]:
                  - /url: "#traces-view"
              - paragraph [ref=e488]: The Traces View focuses on root spans — the starting span of each trace. Each row represents a single trace, showing the root service name, root operation name, root duration, number of spans, and Trace ID. Traces are sorted by descending root duration, which helps identify the longest running traces. You can increase the number of traces displayed up to 200/page using the dropdown on the top right.
              - figure "Traces View — root duration and number of traces per page" [ref=e489]:
                - generic [ref=e497]:
                  - img [ref=e498]
                  - generic [ref=e501]: Traces View — root duration and number of traces per page
                - generic [ref=e502]: Traces View — root duration and number of traces per page
              - heading "Time Series View" [level=3] [ref=e503]:
                - link "Time Series View" [ref=e504] [cursor=pointer]:
                  - /url: "#time-series-view"
              - paragraph [ref=e505]: The Time Series View provides a graphical representation of trace data over time.
              - figure "Timeseries View in Trace Explorer" [ref=e506]:
                - generic [ref=e514]:
                  - img [ref=e515]
                  - generic [ref=e518]: Timeseries View in Trace Explorer
                - generic [ref=e519]: Timeseries View in Trace Explorer
              - heading "Table View" [level=3] [ref=e520]:
                - link "Table View" [ref=e521] [cursor=pointer]:
                  - /url: "#table-view"
              - paragraph [ref=e522]: The Table View provides a tabular representation of the trace data.
              - figure "Table View in Trace Explorer" [ref=e523]:
                - generic [ref=e531]:
                  - img [ref=e532]
                  - generic [ref=e535]: Table View in Trace Explorer
                - generic [ref=e536]: Table View in Trace Explorer
              - paragraph [ref=e537]:
                - strong [ref=e538]: Query Builder
              - paragraph [ref=e539]:
                - text: Both Time Series and Table views use the Query Builder for filtering, aggregation, and grouping. This lets you chart request rates or latency percentiles directly from trace data without needing a separate metrics pipeline. The Query Builder supports
                - code [ref=e540]: count
                - text: ","
                - code [ref=e541]: avg
                - text: ","
                - code [ref=e542]: p99
                - text: ", and more — with Group By, Having, Order By, and Limit. Refer to the"
                - link "Query Builder documentation" [ref=e543] [cursor=pointer]:
                  - /url: /docs/userguide/query-builder-v5
                - text: for more details.
              - figure "Query Builder in Time Series and Table views" [ref=e544]:
                - generic [ref=e552]:
                  - img [ref=e553]
                  - generic [ref=e556]: Query Builder in Time Series and Table views
                - generic [ref=e557]: Query Builder in Time Series and Table views
              - heading "Trace Matching" [level=2] [ref=e558]:
                - link "Trace Matching" [ref=e559] [cursor=pointer]:
                  - /url: "#trace-matching"
              - paragraph [ref=e560]:
                - text: Trace Matching lets you define multiple span queries and combine them with
                - strong [ref=e561]: trace-level operators
                - text: — going beyond single-span filtering to find spans based on their relationships within a trace. Click
                - strong [ref=e562]: Add Trace Matching
                - text: below the filter bar to open the multi-query input.
              - figure "Trace Matching — define multiple queries and combine with trace operators" [ref=e563]:
                - generic [ref=e571]:
                  - img [ref=e572]
                  - generic [ref=e575]: Trace Matching — define multiple queries and combine with trace operators
                - generic [ref=e576]: Trace Matching — define multiple queries and combine with trace operators
              - paragraph [ref=e577]:
                - text: Each query (A, B, C…) is a standard span filter. The
                - strong [ref=e578]: Expression
                - text: "field combines them using trace operators:"
              - table [ref=e580]:
                - rowgroup [ref=e581]:
                  - row "Operator Symbol What it returns" [ref=e582]:
                    - columnheader "Operator" [ref=e583]
                    - columnheader "Symbol" [ref=e584]
                    - columnheader "What it returns" [ref=e585]
                - rowgroup [ref=e586]:
                  - row "Has Direct Child => Spans from A that have a direct child matching B" [ref=e587]:
                    - cell "Has Direct Child" [ref=e588]
                    - cell "=>" [ref=e589]:
                      - code [ref=e590]: =>
                    - cell "Spans from A that have a direct child matching B" [ref=e591]:
                      - text: Spans from A that have a
                      - strong [ref=e592]: direct child
                      - text: matching B
                  - row "Has Descendant -> Spans from A that are ancestors (at any depth) of B" [ref=e593]:
                    - cell "Has Descendant" [ref=e594]
                    - cell "->" [ref=e595]:
                      - code [ref=e596]: "->"
                    - cell "Spans from A that are ancestors (at any depth) of B" [ref=e597]:
                      - text: Spans from A that are
                      - strong [ref=e598]: ancestors
                      - text: (at any depth) of B
                  - row "AND && Spans from A in traces that also contain spans matching B" [ref=e599]:
                    - cell "AND" [ref=e600]
                    - cell "&&" [ref=e601]:
                      - code [ref=e602]: "&&"
                    - cell "Spans from A in traces that also contain spans matching B" [ref=e603]:
                      - text: Spans from A in traces that
                      - strong [ref=e604]: also contain
                      - text: spans matching B
                  - row "OR || Union of spans from both A and B" [ref=e605]:
                    - cell "OR" [ref=e606]
                    - cell "||" [ref=e607]:
                      - code [ref=e608]: "||"
                    - cell "Union of spans from both A and B" [ref=e609]:
                      - strong [ref=e610]: Union
                      - text: of spans from both A and B
                  - row "NOT A NOT B Spans from A in traces that do not contain any spans matching B" [ref=e611]:
                    - cell "NOT" [ref=e612]
                    - cell "A NOT B" [ref=e613]:
                      - code [ref=e614]: A NOT B
                    - cell "Spans from A in traces that do not contain any spans matching B" [ref=e615]:
                      - text: Spans from A in traces that
                      - strong [ref=e616]: do not contain
                      - text: any spans matching B
              - paragraph [ref=e617]:
                - strong [ref=e618]: "Example — Has Descendant:"
              - list [ref=e619]:
                - listitem [ref=e620]:
                  - text: "Query A:"
                  - code [ref=e621]: service.name = 'frontend'
                - listitem [ref=e622]:
                  - text: "Query B:"
                  - code [ref=e623]: service.name = 'customer' AND has_error = true
                - listitem [ref=e624]:
                  - text: "Expression:"
                  - code [ref=e625]: A -> B
                - listitem [ref=e626]:
                  - strong [ref=e627]: "Result:"
                  - text: Returns frontend spans that are ancestors of erroring customer spans at any depth.
              - paragraph [ref=e628]:
                - text: For full operator reference and more examples, see
                - link "Multi-Query Analysis" [ref=e629] [cursor=pointer]:
                  - /url: /docs/querying/multi-query-analysis
                - text: .
              - heading "Quick Filters" [level=2] [ref=e630]:
                - link "Quick Filters" [ref=e631] [cursor=pointer]:
                  - /url: "#quick-filters"
              - paragraph [ref=e632]: The Traces Explorer provides quick filtering of spans using various parameters on the left panel. Select a filter category to expand it, set values, and the view updates automatically.
              - figure "Quick Filters in Traces Explorer" [ref=e633]:
                - generic [ref=e641]:
                  - img [ref=e642]
                  - generic [ref=e645]: Quick Filters in Traces Explorer
                - generic [ref=e646]: Quick Filters in Traces Explorer
              - group [ref=e647]:
                - generic "Default Filters" [ref=e648]
              - heading "Adding Custom Quick Filters" [level=3] [ref=e649]:
                - link "Adding Custom Quick Filters" [ref=e650] [cursor=pointer]:
                  - /url: "#adding-custom-quick-filters"
              - paragraph [ref=e651]: The quick filters panel shows a set of default filters (like Duration, Service Name, HTTP Method, etc.), but you can add any span or resource attribute as a custom quick filter.
              - paragraph [ref=e652]:
                - text: "To customize: click the"
                - strong [ref=e653]: settings icon
                - text: at the top-right of the quick filters panel, then select
                - strong [ref=e654]: Edit quick filters
                - text: . This opens an editor showing your currently added filters and all other available attributes. Search for any attribute and add it to the panel.
              - figure "Edit quick filters — added filters appear at the top, all other available attributes are listed below" [ref=e655]:
                - generic [ref=e663]:
                  - img [ref=e664]
                  - generic [ref=e667]: Edit quick filters — added filters appear at the top, all other available attributes are listed below
                - generic [ref=e668]: Edit quick filters — added filters appear at the top, all other available attributes are listed below
              - generic [ref=e669]:
                - paragraph [ref=e670]: Info
                - paragraph [ref=e672]:
                  - text: Only users with the
                  - strong [ref=e673]: Admin
                  - text: role can edit quick filters. Users with the Viewer or Editor role do not have access to this feature.
              - heading "Bottom Bar" [level=2] [ref=e674]:
                - link "Bottom Bar" [ref=e675] [cursor=pointer]:
                  - /url: "#bottom-bar"
              - paragraph [ref=e676]: The bar at the bottom of each view provides quick actions for saving views, creating alerts, and adding panels to a dashboard.
              - figure "Bottom bar — Save view, Create an Alert, Add to Dashboard" [ref=e677]:
                - generic [ref=e685]:
                  - img [ref=e686]
                  - generic [ref=e689]: Bottom bar — Save view, Create an Alert, Add to Dashboard
                - generic [ref=e690]: Bottom bar — Save view, Create an Alert, Add to Dashboard
              - list [ref=e691]:
                - listitem [ref=e692]:
                  - strong [ref=e693]: Save this view
                  - text: — preserves your current filter and query configuration as a named view for quick access later. Click
                  - strong [ref=e694]: Save this view
                  - text: ", enter a descriptive label, and confirm. You can access saved views from the"
                  - strong [ref=e695]: Select a view
                  - text: dropdown at the bottom of the Explorer or from the
                  - strong [ref=e696]: Views
                  - text: tab at the top of the page.
                - listitem [ref=e697]:
                  - strong [ref=e698]: Create an Alert
                  - text: — instantly creates a
                  - link "Trace based Alert" [ref=e699] [cursor=pointer]:
                    - /url: /docs/alerts-management/trace-based-alerts
                  - text: based on the current filters.
                - listitem [ref=e700]:
                  - strong [ref=e701]: Add to Dashboard
                  - text: — adds the current panel to a new or existing dashboard.
              - heading "Managing Saved Views" [level=3] [ref=e702]:
                - link "Managing Saved Views" [ref=e703] [cursor=pointer]:
                  - /url: "#managing-saved-views"
              - paragraph [ref=e704]:
                - text: To manage all your saved views, switch to the
                - strong [ref=e705]: Views
                - text: "tab at the top of the page. From here you can:"
              - list [ref=e706]:
                - listitem [ref=e707]:
                  - strong [ref=e708]: Update
                  - text: ": Make changes to a loaded view, then click"
                  - strong [ref=e709]: Update this View
                - listitem [ref=e710]:
                  - strong [ref=e711]: Rename
                  - text: ": Search for the view and click the edit icon to change its label"
                - listitem [ref=e712]:
                  - strong [ref=e713]: Delete
                  - text: ": Search for the view and click the delete icon to remove it"
              - generic [ref=e714]:
                - paragraph [ref=e715]: Info
                - paragraph [ref=e717]:
                  - text: Saved views are shared across your organization. All users can access them, but only
                  - strong [ref=e718]: Editor
                  - text: or
                  - strong [ref=e719]: Admin
                  - text: roles can edit or delete views.
              - figure "Views page — manage all saved trace views" [ref=e720]:
                - generic [ref=e728]:
                  - img [ref=e729]
                  - generic [ref=e732]: Views page — manage all saved trace views
                - generic [ref=e733]: Views page — manage all saved trace views
              - generic [ref=e734]:
